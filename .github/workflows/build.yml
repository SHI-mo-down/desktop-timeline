name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2025-vs2026
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: microsoft/setup-msbuild@v3

      - name: Build x64 Release
        run: msbuild /m /p:Configuration=Release /p:Platform=x64 DesktopIconSorter/DesktopIconSorter.slnx

      - name: Package artifacts
        shell: bash
        run: |
          mkdir release
          cp DesktopIconSorter/x64/Release/DesktopIconSorter.exe release/
          cp DesktopIconSorter/x64/Release/ShellExt.dll release/ 2>/dev/null || true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: release/*
          generate_release_notes: true

      - name: Upload artifacts (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: DesktopIconSorter-x64
          path: release/
